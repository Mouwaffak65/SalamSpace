    .upload-area.dragover { border-color: #1f6390; background: #e3eef7; }

<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
      <a href="arabic-test.html" class="nav-cta"><i class="fas fa-certificate"></i> اختبار اللغة</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-image"></i> JPEG إلى PDF</h2>
    <div class="desc">حوّل صورك بصيغة JPEG إلى ملف PDF واحد.</div>
    
    <div class="upload-area" id="dropZone">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>اسحب صور JPEG هنا أو انقر لاختيارها</p>
      <input type="file" id="fileInput" accept="image/*" multiple style="display:none;" />
      <button class="btn" id="uploadBtn"><i class="fas fa-upload"></i> اختيار صور</button>
      <p style="margin-top: 1rem; font-size: 0.9rem; color: #6f8ca0;">يدعم الصور حتى 5 ميجابايت لكل صورة</p>
    </div>

    <div id="previewContainer"></div>
    <button class="download-btn" id="downloadBtn"><i class="fas fa-download"></i> تحميل PDF</button>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  // Menu toggle
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const previewContainer = document.getElementById('previewContainer');
  const downloadBtn = document.getElementById('downloadBtn');

  let selectedImages = [];

  uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  fileInput.addEventListener('change', (e) => { if(e.target.files.length) handleFiles(e.target.files); });

  function handleFiles(files) {
    const validFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
    if(validFiles.length === 0) { alert('الرجاء اختيار صور صالحة'); return; }
    
    selectedImages = [];
    previewContainer.innerHTML = '<h3 style="margin: 1rem 0 0.5rem; color:#0b2a3e;">الصور المحددة:</h3><div class="preview-grid"></div>';
    const grid = previewContainer.querySelector('.preview-grid');
    
    validFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = document.createElement('img');
        img.src = e.target.result;
        grid.appendChild(img);
        selectedImages.push(e.target.result);
        if(selectedImages.length === validFiles.length) downloadBtn.style.display = 'inline-block';
      };
      reader.readAsDataURL(file);
    });
  }

  downloadBtn.addEventListener('click', () => {
    if(selectedImages.length === 0) return;
    // Créer un PDF simple avec jsPDF
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageWidth = 210;
    const pageHeight = 297;
    
    selectedImages.forEach((imgData, idx) => {
      if(idx > 0) pdf.addPage();
      const img = new Image();
      img.src = imgData;
      const aspectRatio = img.width / img.height;
      let width = pageWidth - 20;
      let height = width / aspectRatio;
      if(height > pageHeight - 20) { height = pageHeight - 20; width = height * aspectRatio; }
      const x = (pageWidth - width) / 2;
      const y = (pageHeight - height) / 2;
      pdf.addImage(imgData, 'JPEG', x, y, width, height);
    });
    
    pdf.save('images_converties.pdf');
  });

  // Load jsPDF
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  document.head.appendChild(script);
</script>
</body>
</html>
