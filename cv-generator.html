<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منشئ السيرة الذاتية | salamm.online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #f4f8fe; min-height: 100vh; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 0.6rem 1.8rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(0,20,40,0.08); margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.7); }
    .logo h1 { font-size: 1.9rem; font-weight: 700; color: #0b2a3e; display: flex; align-items: center; gap: 6px; }
    .logo h1 i { color: #1f6390; }
    .main-nav { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem 1.2rem; }
    .main-nav a { color: #1a3b52; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 0.4rem 0.2rem; border-bottom: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .main-nav a:hover { border-bottom-color: #1f6390; }
    .main-nav a i { color: #2a7faa; }
    .main-nav .nav-cta { background: #1a4b6d; color: white; padding: 0.4rem 1.4rem; border-radius: 40px; border-bottom: none; }
    .main-nav .nav-cta:hover { background: #0f3a57; border-bottom: none; }
    .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #0b2a3e; cursor: pointer; }
    .tool-page { background: white; border-radius: 40px; padding: 2.5rem; box-shadow: 0 8px 30px rgba(0,20,30,0.06); }
    .tool-page h2 { font-size: 2rem; color: #0b2a3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; }
    .tool-page h2 i { color: #1f6390; }
    .tool-page .desc { color: #2c5779; font-size: 1.1rem; margin-bottom: 2rem; border-right: 4px solid #1f6390; padding-right: 1rem; }
    .cv-form { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-group { margin-bottom: 0.5rem; }
    .form-group label { display: block; font-weight: 600; color: #0b2a3e; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.7rem 1rem; border: 2px solid #dce6ef; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; }
    .form-group input:focus, .form-group textarea:focus { border-color: #1f6390; outline: none; }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .photo-upload { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; background: #dce6ef; display: flex; align-items: center; justify-content: center; color: #6f8ca0; overflow: hidden; border: 3px solid #eaf1f7; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .btn { background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #0f3a57; }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219a52; }
    .btn-secondary { background: #e8f0f7; color: #0b2a3e; }
    .btn-secondary:hover { background: #d5e2ed; }
    .cv-preview { margin-top: 2rem; padding: 2rem; background: #f8fbfe; border-radius: 24px; border: 2px solid #eaf1f7; display: none; }
    .cv-preview h3 { color: #0b2a3e; margin-bottom: 1rem; }
    .cv-preview .cv-content { font-size: 0.95rem; line-height: 1.8; }
    .cv-preview .cv-content strong { color: #1f6390; }
    .full-width { grid-column: 1 / -1; }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .footer { margin-top: 2.5rem; text-align: center; color: #2c5779; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem 1.8rem; }
    .footer a { color: #1f6390; text-decoration: none; }
    @media (max-width: 820px) { .menu-toggle { display: block; } .main-nav { display: none; flex-direction: column; width: 100%; background: white; padding: 1rem; border-radius: 32px; margin-top: 0.8rem; } .main-nav.open { display: flex; } .header { padding: 0.6rem 1rem; } .tool-page { padding: 1.5rem; } .cv-form { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
      <a href="arabic-test.html" class="nav-cta"><i class="fas fa-certificate"></i> اختبار اللغة</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-id-card"></i> منشئ السيرة الذاتية</h2>
    <div class="desc">أنشئ سيرة ذاتية احترافية مع صورة شخصية، جاهزة للطباعة أو التحميل بصيغة PDF.</div>
    
    <form id="cvForm" class="cv-form">
      <div class="form-group full-width photo-upload">
        <label>الصورة الشخصية</label>
        <div class="photo-preview" id="photoPreview"><i class="fas fa-user fa-2x"></i></div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" />
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('photoInput').click()"><i class="fas fa-upload"></i> تحميل صورة</button>
        <button type="button" class="btn btn-secondary" id="removePhotoBtn"><i class="fas fa-times"></i> إزالة</button>
      </div>

      <div class="form-group">
        <label><i class="fas fa-user"></i> الاسم الكامل</label>
        <input type="text" id="fullName" placeholder="أحمد محمد" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-phone"></i> رقم الهاتف</label>
        <input type="text" id="phone" placeholder="+212 6XX XX XX XX" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="ahmed@example.com" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-map-marker-alt"></i> العنوان</label>
        <input type="text" id="address" placeholder="الدار البيضاء، المغرب" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-graduation-cap"></i> التخصص الدراسي</label>
        <input type="text" id="major" placeholder="هندسة البرمجيات" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-university"></i> الجامعة</label>
        <input type="text" id="university" placeholder="جامعة محمد الخامس" />
      </div>
      <div class="form-group full-width">
        <label><i class="fas fa-bullseye"></i> الهدف المهني</label>
        <textarea id="objective" rows="2" placeholder="أبحث عن منحة دراسية في مجال..." style="min-height:60px;"></textarea>
      </div>
      <div class="form-group full-width">
        <label><i class="fas fa-tasks"></i> الخبرات والمهارات</label>
        <textarea id="experience" rows="3" placeholder="- تطوير مواقع الويب&#10;- لغات البرمجة: JavaScript, Python&#10;- إدارة المشاريع" style="min-height:80px;"></textarea>
      </div>
      <div class="form-group full-width">
        <label><i class="fas fa-award"></i> الإنجازات والشهادات</label>
        <textarea id="achievements" rows="2" placeholder="- شهادة TOEFL&#10;- جائزة أفضل مشروع" style="min-height:60px;"></textarea>
      </div>
    </form>

    <div class="actions">
      <button class="btn btn-success" id="generateBtn"><i class="fas fa-file-alt"></i> إنشاء السيرة الذاتية</button>
      <button class="btn" id="downloadPdfBtn" style="display:none;"><i class="fas fa-download"></i> تحميل PDF</button>
      <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-redo"></i> إعادة تعيين</button>
    </div>

    <div class="cv-preview" id="cvPreview">
      <h3><i class="fas fa-eye"></i> معاينة السيرة الذاتية</h3>
      <div class="cv-content" id="cvContent"></div>
    </div>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  let photoData = null;

  // Photo upload
  document.getElementById('photoInput').addEventListener('change', function(e) {
    if(this.files[0]) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        photoData = ev.target.result;
        document.getElementById('photoPreview').innerHTML = `<img src="${photoData}" />`;
      };
      reader.readAsDataURL(this.files[0]);
    }
  });

  document.getElementById('removePhotoBtn').addEventListener('click', () => {
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });

  // Generate CV
  document.getElementById('generateBtn').addEventListener('click', function() {
    const name = document.getElementById('fullName').value || 'الاسم الكامل';
    const phone = document.getElementById('phone').value || 'رقم الهاتف';
    const email = document.getElementById('email').value || 'البريد الإلكتروني';
    const address = document.getElementById('address').value || 'العنوان';
    const major = document.getElementById('major').value || 'التخصص';
    const university = document.getElementById('university').value || 'الجامعة';
    const objective = document.getElementById('objective').value || 'الهدف المهني';
    const experience = document.getElementById('experience').value || 'الخبرات والمهارات';
    const achievements = document.getElementById('achievements').value || 'الإنجازات والشهادات';

    let html = `
      <div style="display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap;">
        ${photoData ? `<div><img src="${photoData}" style="width:120px; height:120px; border-radius:50%; object-fit:cover; border:3px solid #1f6390;" /></div>` : ''}
        <div>
          <h2 style="color:#0b2a3e; margin-bottom:0.2rem;">${name}</h2>
          <p style="color:#2c5779;"><i class="fas fa-graduation-cap"></i> ${major} - ${university}</p>
        </div>
      </div>
      <hr style="margin:1rem 0; border-color:#eaf1f7;" />
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:0.5rem 2rem; margin-bottom:1rem;">
        <p><i class="fas fa-phone" style="color:#1f6390;"></i> ${phone}</p>
        <p><i class="fas fa-envelope" style="color:#1f6390;"></i> ${email}</p>
        <p><i class="fas fa-map-marker-alt" style="color:#1f6390;"></i> ${address}</p>
      </div>
      <div style="margin-bottom:1rem;">
        <h4 style="color:#1f6390; margin-bottom:0.3rem;"><i class="fas fa-bullseye"></i> الهدف المهني</h4>
        <p>${objective}</p>
      </div>
      <div style="margin-bottom:1rem;">
        <h4 style="color:#1f6390; margin-bottom:0.3rem;"><i class="fas fa-tasks"></i> الخبرات والمهارات</h4>
        <p style="white-space:pre-line;">${experience}</p>
      </div>
      <div>
        <h4 style="color:#1f6390; margin-bottom:0.3rem;"><i class="fas fa-award"></i> الإنجازات والشهادات</h4>
        <p style="white-space:pre-line;">${achievements}</p>
      </div>
    `;

    document.getElementById('cvContent').innerHTML = html;
    document.getElementById('cvPreview').style.display = 'block';
    document.getElementById('downloadPdfBtn').style.display = 'inline-block';
  });

  // Download PDF
  document.getElementById('downloadPdfBtn').addEventListener('click', function() {
    const content = document.getElementById('cvContent').innerHTML;
    if(!content) return;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const html = `
      <div dir="rtl" style="font-family: 'Segoe UI', Arial, sans-serif; padding: 10mm; max-width: 100%;">
        ${content}
      </div>
    `;
    // Using html2canvas for better rendering
    const container = document.createElement('div');
    container.innerHTML = html;
    container.style.cssText = 'position:fixed; left:-9999px; top:0; width:210mm; background:white; padding:10mm;';
    document.body.appendChild(container);
    
    html2canvas(container, { scale: 2, useCORS: true }).then(canvas => {
      const imgData = canvas.toDataURL('image/jpeg', 0.95);
      const pdfWidth = 210;
      const pdfHeight = (canvas.height * pdfWidth) / canvas.width;
      pdf.addImage(imgData, 'JPEG', 0, 0, pdfWidth, pdfHeight);
      pdf.save('CV_etudiant.pdf');
      document.body.removeChild(container);
    }).catch(() => {
      // Fallback
      pdf.text('السيرة الذاتية', 105, 20, { align: 'center' });
      pdf.save('CV_etudiant.pdf');
      document.body.removeChild(container);
    });
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    document.getElementById('cvForm').reset();
    document.getElementById('cvPreview').style.display = 'none';
    document.getElementById('downloadPdfBtn').style.display = 'none';
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });

  const script1 = document.createElement('script');
  script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  document.head.appendChild(script1);
  
  const script2 = document.createElement('script');
  script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(script2);
</script>
</body>
</html>
