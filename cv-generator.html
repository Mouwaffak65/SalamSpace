<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>منشئ السيرة الذاتية | salamm.online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Tahoma', system-ui, sans-serif; }
    body { background: #f4f8fe; min-height: 100vh; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 0.6rem 1.8rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(0,20,40,0.08); margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.7); }
    .logo h1 { font-size: 1.9rem; font-weight: 700; color: #0b2a3e; display: flex; align-items: center; gap: 6px; }
    .logo h1 i { color: #1f6390; }
    .main-nav { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem 1.2rem; }
    .main-nav a { color: #1a3b52; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 0.4rem 0.2rem; border-bottom: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .main-nav a:hover { border-bottom-color: #1f6390; }
    .main-nav a i { color: #2a7faa; }
    .main-nav .nav-cta { background: #1a4b6d; color: white; padding: 0.4rem 1.4rem; border-radius: 40px; border-bottom: none; }
    .main-nav .nav-cta:hover { background: #0f3a57; border-bottom: none; }
    .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #0b2a3e; cursor: pointer; }
    .tool-page { background: white; border-radius: 40px; padding: 2.5rem; box-shadow: 0 8px 30px rgba(0,20,30,0.06); }
    .tool-page h2 { font-size: 2rem; color: #0b2a3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; }
    .tool-page h2 i { color: #1f6390; }
    .tool-page .desc { color: #2c5779; font-size: 1.1rem; margin-bottom: 2rem; border-right: 4px solid #1f6390; padding-right: 1rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; color: #0b2a3e; margin-bottom: 0.3rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.7rem 1rem; border: 2px solid #dce6ef; border-radius: 12px; font-size: 0.95rem; transition: 0.2s; font-family: 'Segoe UI', 'Tahoma', sans-serif; }
    .form-group input:focus, .form-group textarea:focus { border-color: #1f6390; outline: none; }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; }
    .photo-upload { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }
    .photo-preview { width: 80px; height: 80px; border-radius: 50%; background: #dce6ef; display: flex; align-items: center; justify-content: center; color: #6f8ca0; overflow: hidden; border: 3px solid #eaf1f7; flex-shrink: 0; }
    .photo-preview img { width: 100%; height: 100%; object-fit: cover; }
    .btn { background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; font-size: 1rem; transition: 0.2s; }
    .btn:hover { background: #0f3a57; }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219a52; }
    .btn-secondary { background: #e8f0f7; color: #0b2a3e; }
    .btn-secondary:hover { background: #d5e2ed; }
    .btn-warning { background: #e67e22; color: white; }
    .btn-warning:hover { background: #d35400; }
    .full-width { grid-column: 1 / -1; }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1.5rem; }
    .footer { margin-top: 2.5rem; text-align: center; color: #2c5779; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem 1.8rem; }
    .footer a { color: #1f6390; text-decoration: none; }

    /* ===== CV PREVIEW ===== */
    #cv-preview {
      background: #ffffff;
      border: 1px solid #dce6ef;
      border-radius: 16px;
      margin-top: 1.5rem;
      overflow: hidden;
      direction: rtl;
      text-align: right;
      width: 100%;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
      box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    }
    #cv-preview * { direction: rtl !important; text-align: right !important; font-family: 'Segoe UI', 'Tahoma', Arial, sans-serif !important; unicode-bidi: embed !important; }

    .cv-header {
      background: #1a3b52;
      color: white;
      padding: 28px 30px 22px;
      display: flex;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }
    .cv-photo-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      border: 4px solid #e8c99a;
      flex-shrink: 0;
      background: #2a7faa;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      color: rgba(255,255,255,0.4);
      overflow: hidden;
    }
    .cv-photo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .cv-header-info { flex: 1; min-width: 180px; }
    .cv-header-info .cv-name { font-size: 1.6rem; font-weight: 700; color: white; margin-bottom: 2px; }
    .cv-header-info .cv-title { font-size: 0.95rem; color: #e8c99a; font-weight: 500; margin-bottom: 6px; }
    .cv-header-info .cv-contact { display: flex; flex-wrap: wrap; gap: 8px 18px; font-size: 0.8rem; color: rgba(255,255,255,0.8); }
    .cv-header-info .cv-contact span { display: flex; align-items: center; gap: 4px; }

    .cv-body { padding: 20px 28px; }
    .cv-section { margin-bottom: 16px; }
    .cv-section:last-child { margin-bottom: 0; }
    .cv-section-title {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a3b52;
      border-bottom: 3px solid #e8c99a;
      padding-bottom: 4px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cv-section-title i { color: #2a7faa; font-size: 0.9rem; }
    .cv-section-body {
      font-size: 0.85rem;
      color: #1c2b22;
      line-height: 1.8;
      white-space: pre-line;
      padding-right: 4px;
    }
    .cv-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .cv-tag { background: #eaf1f7; color: #1a3b52; padding: 2px 14px; border-radius: 14px; font-size: 0.75rem; font-weight: 600; }
    .cv-tag.gold { background: #e8c99a; color: #1a3b52; }
    .cv-tag.green { background: #27ae60; color: white; }
    .cv-footer {
      border-top: 1px solid #eaf1f7;
      padding: 10px 28px;
      font-size: 0.65rem;
      color: #8a9aa8;
      text-align: center;
      direction: rtl;
    }

    @media (max-width: 820px) {
      .menu-toggle { display: block; }
      .main-nav { display: none; flex-direction: column; width: 100%; background: white; padding: 1rem; border-radius: 32px; margin-top: 0.8rem; }
      .main-nav.open { display: flex; }
      .header { padding: 0.6rem 1rem; }
      .tool-page { padding: 1.5rem; }
      .form-row { grid-template-columns: 1fr; }
      .cv-header { flex-direction: column; text-align: center; padding: 20px; }
      .cv-header-info .cv-contact { justify-content: center; }
      .cv-body { padding: 16px; }
    }
    @media (max-width: 480px) {
      .cv-photo-circle { width: 70px; height: 70px; font-size: 1.8rem; }
      .cv-header-info .cv-name { font-size: 1.2rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-id-card"></i> منشئ السيرة الذاتية</h2>
    <div class="desc">أنشئ سيرة ذاتية احترافية مع صورة شخصية، جاهزة للتحميل بصيغة PDF.</div>

    <form id="cvForm" class="cv-form">
      <!-- Photo -->
      <div class="form-group full-width photo-upload">
        <label>الصورة الشخصية</label>
        <div class="photo-preview" id="photoPreview"><i class="fas fa-user fa-2x"></i></div>
        <input type="file" id="photoInput" accept="image/*" style="display:none;" />
        <button type="button" class="btn btn-secondary" onclick="document.getElementById('photoInput').click()"><i class="fas fa-upload"></i> تحميل صورة</button>
        <button type="button" class="btn btn-secondary" id="removePhotoBtn"><i class="fas fa-times"></i> إزالة</button>
      </div>

      <!-- Informations personnelles -->
      <div class="form-group">
        <label><i class="fas fa-user"></i> الاسم الكامل *</label>
        <input type="text" id="fullName" placeholder="الاسم الكامل" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-briefcase"></i> اللقب / التخصص</label>
        <input type="text" id="title" placeholder="طالب / مهندس / باحث" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-calendar-alt"></i> تاريخ الميلاد</label>
        <input type="text" id="birthdate" placeholder="يوم / شهر / سنة" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-phone"></i> رقم الهاتف</label>
        <input type="text" id="phone" placeholder="+212 6X XX XX XX" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="email@example.com" />
      </div>
      <div class="form-group">
        <label><i class="fas fa-map-marker-alt"></i> العنوان</label>
        <input type="text" id="address" placeholder="المدينة، الدولة" />
      </div>

      <!-- Éducation -->
      <div class="form-group full-width">
        <label><i class="fas fa-graduation-cap"></i> التعليم (سطر واحد لكل شهادة)</label>
        <textarea id="education" rows="3" style="min-height:80px;"></textarea>
      </div>

      <!-- Expériences -->
      <div class="form-group full-width">
        <label><i class="fas fa-briefcase"></i> الخبرات والتجارب</label>
        <textarea id="experience" rows="3" style="min-height:80px;"></textarea>
      </div>

      <!-- Compétences / Certificats -->
      <div class="form-group full-width">
        <label><i class="fas fa-certificate"></i> الشهادات والدورات</label>
        <textarea id="certificates" rows="3" style="min-height:80px;"></textarea>
      </div>

      <!-- Langues -->
      <div class="form-group full-width">
        <label><i class="fas fa-language"></i> اللغات (مفصولة بفواصل)</label>
        <input type="text" id="languages" placeholder="العربية, الفرنسية, الإنجليزية" />
      </div>

      <!-- Compétences techniques -->
      <div class="form-group full-width">
        <label><i class="fas fa-laptop"></i> المهارات التقنية (مفصولة بفواصل)</label>
        <input type="text" id="skills" placeholder="Python, JavaScript, HTML, CSS" />
      </div>

      <!-- Informations supplémentaires -->
      <div class="form-group full-width">
        <label><i class="fas fa-plus-circle"></i> معلومات إضافية</label>
        <textarea id="additional" rows="2" style="min-height:50px;"></textarea>
      </div>
    </form>

    <div class="actions">
      <button class="btn btn-success" id="generateBtn"><i class="fas fa-file-alt"></i> إنشاء السيرة الذاتية</button>
      <button class="btn" id="downloadPdfBtn" style="display:none;"><i class="fas fa-download"></i> تحميل PDF</button>
      <button class="btn btn-secondary" id="resetBtn"><i class="fas fa-redo"></i> إعادة تعيين</button>
      <button class="btn btn-warning" id="loadExample1"><i class="fas fa-user-graduate"></i> مثال 1 (طالب)</button>
      <button class="btn btn-warning" id="loadExample2"><i class="fas fa-user-tie"></i> مثال 2 (مهندس)</button>
    </div>

    <!-- Aperçu du CV -->
    <div id="cv-preview" style="display:none;"></div>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  // ===== MENU =====
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  // ===== PHOTO =====
  let photoData = null;

  document.getElementById('photoInput').addEventListener('change', function(e) {
    if(this.files[0]) {
      const reader = new FileReader();
      reader.onload = function(ev) {
        photoData = ev.target.result;
        document.getElementById('photoPreview').innerHTML = `<img src="${photoData}" />`;
      };
      reader.readAsDataURL(this.files[0]);
    }
  });

  document.getElementById('removePhotoBtn').addEventListener('click', () => {
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });

  // ===== GENERATE CV =====
  function generateCV() {
    const name = document.getElementById('fullName').value || 'الاسم الكامل';
    const title = document.getElementById('title').value || 'اللقب';
    const birthdate = document.getElementById('birthdate').value || 'تاريخ الميلاد';
    const phone = document.getElementById('phone').value || 'رقم الهاتف';
    const email = document.getElementById('email').value || 'البريد الإلكتروني';
    const address = document.getElementById('address').value || 'العنوان';
    const education = document.getElementById('education').value || 'التعليم';
    const experience = document.getElementById('experience').value || '';
    const certificates = document.getElementById('certificates').value || 'الشهادات';
    const languages = document.getElementById('languages').value || 'اللغات';
    const skills = document.getElementById('skills').value || 'المهارات';
    const additional = document.getElementById('additional').value || '';

    let html = `
      <div class="cv-header">
        <div class="cv-photo-circle">
          ${photoData ? `<img src="${photoData}" alt="صورة">` : '👤'}
        </div>
        <div class="cv-header-info">
          <div class="cv-name">${name}</div>
          <div class="cv-title">${title}</div>
          <div class="cv-contact">
            <span><i class="fas fa-calendar-alt"></i> ${birthdate}</span>
            <span><i class="fas fa-phone"></i> ${phone}</span>
            <span><i class="fas fa-envelope"></i> ${email}</span>
            <span><i class="fas fa-map-marker-alt"></i> ${address}</span>
          </div>
        </div>
      </div>
      <div class="cv-body">
    `;

    if (education) {
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-graduation-cap"></i> التعليم</div>
          <div class="cv-section-body">${education.replace(/\n/g, '\n')}</div>
        </div>
      `;
    }

    if (experience) {
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-briefcase"></i> الخبرات</div>
          <div class="cv-section-body">${experience.replace(/\n/g, '\n')}</div>
        </div>
      `;
    }

    if (certificates) {
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-certificate"></i> الشهادات والدورات</div>
          <div class="cv-section-body">${certificates.replace(/\n/g, '\n')}</div>
        </div>
      `;
    }

    if (languages) {
      const langList = languages.split(',').map(l => l.trim()).filter(l => l);
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-language"></i> اللغات</div>
          <div class="cv-section-body">
            <div class="cv-tags">${langList.map(l => `<span class="cv-tag gold">${l}</span>`).join('')}</div>
          </div>
        </div>
      `;
    }

    if (skills) {
      const skillList = skills.split(',').map(s => s.trim()).filter(s => s);
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-laptop"></i> المهارات التقنية</div>
          <div class="cv-section-body">
            <div class="cv-tags">${skillList.map(s => `<span class="cv-tag green">${s}</span>`).join('')}</div>
          </div>
        </div>
      `;
    }

    if (additional) {
      html += `
        <div class="cv-section">
          <div class="cv-section-title"><i class="fas fa-plus-circle"></i> معلومات إضافية</div>
          <div class="cv-section-body">${additional.replace(/\n/g, '\n')}</div>
        </div>
      `;
    }

    html += `
      </div>
      <div class="cv-footer">السيرة الذاتية من إعداد salamm.online</div>
    `;

    const preview = document.getElementById('cv-preview');
    preview.innerHTML = html;
    preview.style.display = 'block';
    document.getElementById('downloadPdfBtn').style.display = 'inline-block';
  }

  // ===== EXEMPLES =====
  const examples = {
    example1: {
      name: 'أحمد محمد العلوي',
      title: 'طالب ماجستير في الذكاء الاصطناعي',
      birthdate: '15 / 03 / 2000',
      phone: '+212 6 12 34 56 78',
      email: 'ahmed.aloui@email.com',
      address: 'الدار البيضاء، المغرب',
      education: '2022-2024 ماجستير في الذكاء الاصطناعي – جامعة الحسن الثاني، الدار البيضاء\n2018-2022 ليسانس في علوم الحاسوب – جامعة محمد الخامس، الرباط\n2018 بكالوريا علوم رياضية – ثانوية ابن سينا، الدار البيضاء',
      experience: '2023-2024 متدرب – شركة DataMind، الدار البيضاء (تطوير نماذج تعلم الآلة)\n2022-2023 مساعد تدريس – جامعة الحسن الثاني (مادة البرمجة بلغة Python)\n2021-2022 مشروع تخرج: نظام توصية للمكتبات باستخدام الذكاء الاصطناعي',
      certificates: 'شهادة Google Professional ML Engineer\nشهادة Coursera – Deep Learning Specialization\nشهادة IELTS (7.5)',
      languages: 'العربية (لغة أم), الفرنسية (ممتاز), الإنجليزية (جيد جداً), الإسبانية (أساسي)',
      skills: 'Python, TensorFlow, PyTorch, Scikit-learn, Pandas, NumPy, SQL, Docker, Git, Linux',
      additional: 'عضو في نادي الذكاء الاصطناعي بجامعة الحسن الثاني\nمشارك في مسابقة黑客松 الوطنية للذكاء الاصطناعي 2023'
    },
    example2: {
      name: 'سارة بنت عبد الله',
      title: 'مهندسة برمجيات – Full Stack Developer',
      birthdate: '22 / 07 / 1998',
      phone: '+212 6 98 76 54 32',
      email: 'sara.bent@email.com',
      address: 'الرباط، المغرب',
      education: '2016-2020 مهندس برمجيات – المعهد الوطني للبريد والمواصلات (INPT)، الرباط\n2020-2022 ماستر في هندسة الويب – جامعة محمد الخامس، الرباط\n2016 بكالوريا علوم فيزيائية – ثانوية مولاي رشيد، الدار البيضاء',
      experience: '2022-2024 مطورة Full Stack – شركة WebSolutions، الرباط (React, Node.js, MongoDB)\n2021-2022 مطورة Frontend – شركة Digitaleo، الدار البيضاء (Angular, TypeScript)\n2020-2021 متدربة – شركة Oracle، الدار البيضاء (développement Java)',
      certificates: 'شهادة AWS Certified Developer – Associate\nشهادة Microsoft Azure Fundamentals\nشهادة TOEFL (95/120)',
      languages: 'العربية (لغة أم), الفرنسية (ممتاز), الإنجليزية (جيد جداً)',
      skills: 'JavaScript, TypeScript, React, Angular, Node.js, Express, MongoDB, PostgreSQL, Docker, AWS, Git, CI/CD',
      additional: 'مؤسسة مبادرة "Women in Tech Morocco"\nمدونة تقنية تنشر مقالات عن تطوير الويب'
    }
  };

  // ===== LOAD EXAMPLE =====
  function loadExample(example) {
    const data = examples[example];
    if (!data) return;

    document.getElementById('fullName').value = data.name;
    document.getElementById('title').value = data.title;
    document.getElementById('birthdate').value = data.birthdate;
    document.getElementById('phone').value = data.phone;
    document.getElementById('email').value = data.email;
    document.getElementById('address').value = data.address;
    document.getElementById('education').value = data.education;
    document.getElementById('experience').value = data.experience || '';
    document.getElementById('certificates').value = data.certificates;
    document.getElementById('languages').value = data.languages;
    document.getElementById('skills').value = data.skills;
    document.getElementById('additional').value = data.additional || '';

    // Réinitialiser la photo
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';

    generateCV();
  }

  // ===== EVENT LISTENERS =====
  document.getElementById('generateBtn').addEventListener('click', generateCV);

  document.getElementById('resetBtn').addEventListener('click', () => {
    document.querySelectorAll('#cvForm input, #cvForm textarea').forEach(el => el.value = '');
    document.getElementById('cv-preview').style.display = 'none';
    document.getElementById('cv-preview').innerHTML = '';
    document.getElementById('downloadPdfBtn').style.display = 'none';
    photoData = null;
    document.getElementById('photoPreview').innerHTML = '<i class="fas fa-user fa-2x"></i>';
    document.getElementById('photoInput').value = '';
  });

  document.getElementById('loadExample1').addEventListener('click', () => loadExample('example1'));
  document.getElementById('loadExample2').addEventListener('click', () => loadExample('example2'));

  // ===== DOWNLOAD PDF =====
  document.getElementById('downloadPdfBtn').addEventListener('click', async function() {
    const preview = document.getElementById('cv-preview');
    if (!preview || preview.style.display === 'none') { alert('الرجاء إنشاء السيرة الذاتية أولاً'); return; }

    const btn = this;
    btn.disabled = true;
    btn.textContent = '⏳ جاري التحميل...';

    try {
      const canvas = await html2canvas(preview, {
        scale: 2,
        useCORS: true,
        backgroundColor: '#ffffff',
        logging: false,
        onclone: function(clonedDoc) {
          const clonedEl = clonedDoc.getElementById('cv-preview');
          if (clonedEl) {
            clonedEl.style.direction = 'rtl';
            clonedEl.style.textAlign = 'right';
            clonedEl.querySelectorAll('*').forEach(child => {
              child.style.direction = 'rtl';
              child.style.textAlign = 'right';
            });
          }
        }
      });

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({
        orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
        unit: 'px',
        format: [canvas.width / 2, canvas.height / 2]
      });
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, canvas.width / 2, canvas.height / 2);

      const name = document.getElementById('fullName').value || 'CV';
      pdf.save(`السيرة_الذاتية_${name}_سلام_سبيس.pdf`);

    } catch (err) {
      alert('خطأ: ' + err.message);
    }

    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-download"></i> تحميل PDF';
  });

  // ===== LOAD SCRIPTS =====
  const script1 = document.createElement('script');
  script1.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  document.head.appendChild(script1);

  const script2 = document.createElement('script');
  script2.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
  document.head.appendChild(script2);

  // Charger l'exemple 1 par défaut
  window.addEventListener('load', function() {
    setTimeout(() => {
      loadExample('example1');
    }, 400);
  });
</script>
</body>
</html>
