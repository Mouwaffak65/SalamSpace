<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>دمج PDF | salamm.online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #f4f8fe; min-height: 100vh; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 0.6rem 1.8rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(0,20,40,0.08); margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.7); }
    .logo h1 { font-size: 1.9rem; font-weight: 700; color: #0b2a3e; display: flex; align-items: center; gap: 6px; }
    .logo h1 i { color: #1f6390; }
    .main-nav { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem 1.2rem; }
    .main-nav a { color: #1a3b52; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 0.4rem 0.2rem; border-bottom: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .main-nav a:hover { border-bottom-color: #1f6390; }
    .main-nav a i { color: #2a7faa; }
    .main-nav .nav-cta { background: #1a4b6d; color: white; padding: 0.4rem 1.4rem; border-radius: 40px; border-bottom: none; }
    .main-nav .nav-cta:hover { background: #0f3a57; border-bottom: none; }
    .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #0b2a3e; cursor: pointer; }
    .tool-page { background: white; border-radius: 40px; padding: 2.5rem; box-shadow: 0 8px 30px rgba(0,20,30,0.06); }
    .tool-page h2 { font-size: 2rem; color: #0b2a3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; }
    .tool-page h2 i { color: #1f6390; }
    .tool-page .desc { color: #2c5779; font-size: 1.1rem; margin-bottom: 2rem; border-right: 4px solid #1f6390; padding-right: 1rem; }
    .upload-area { border: 3px dashed #cbdae6; border-radius: 30px; padding: 2rem; text-align: center; background: #f8fbfe; transition: 0.3s; cursor: pointer; }
    .upload-area:hover { border-color: #1f6390; background: #f0f6fc; }
    .upload-area.dragover { border-color: #1f6390; background: #e3eef7; }
    .upload-area i { font-size: 4rem; color: #1f6390; margin-bottom: 1rem; }
    .upload-area p { color: #1a3b52; font-size: 1.1rem; }
    .upload-area .btn { display: inline-block; margin-top: 1.2rem; background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
    .upload-area .btn:hover { background: #0f3a57; }
    .file-list { margin-top: 1.5rem; }
    .file-item { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1rem; background: #f8fbfe; border-radius: 12px; margin-bottom: 0.5rem; border: 1px solid #eaf1f7; }
    .file-item .name { font-weight: 500; color: #0b2a3e; }
    .file-item .size { color: #6f8ca0; font-size: 0.85rem; }
    .file-item .remove { color: #e74c3c; cursor: pointer; background: none; border: none; font-size: 1.2rem; }
    .download-btn { margin-top: 1.5rem; background: #27ae60; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; display: none; }
    .download-btn:hover { background: #219a52; }
    .footer { margin-top: 2.5rem; text-align: center; color: #2c5779; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem 1.8rem; }
    .footer a { color: #1f6390; text-decoration: none; }
    .progress-bar { width: 100%; height: 8px; background: #eaf1f7; border-radius: 10px; margin: 1rem 0; display: none; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: #1f6390; width: 0%; border-radius: 10px; transition: width 0.3s; }
    @media (max-width: 820px) { .menu-toggle { display: block; } .main-nav { display: none; flex-direction: column; width: 100%; background: white; padding: 1rem; border-radius: 32px; margin-top: 0.8rem; } .main-nav.open { display: flex; } .header { padding: 0.6rem 1rem; } .tool-page { padding: 1.5rem; } }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
      <a href="arabic-test.html" class="nav-cta"><i class="fas fa-certificate"></i> اختبار اللغة</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-object-group"></i> دمج PDF</h2>
    <div class="desc">ادمج عدة ملفات PDF في ملف واحد مرتب.</div>
    
    <div class="upload-area" id="dropZone">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>اسحب ملفات PDF هنا أو انقر لاختيارها</p>
      <input type="file" id="fileInput" accept=".pdf" multiple style="display:none;" />
      <button class="btn" id="uploadBtn"><i class="fas fa-upload"></i> اختيار ملفات PDF</button>
      <p style="margin-top: 1rem; font-size: 0.9rem; color: #6f8ca0;">يمكنك اختيار أكثر من ملف</p>
    </div>

    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="file-list" id="fileList"></div>
    <button class="download-btn" id="downloadBtn"><i class="fas fa-download"></i> تحميل PDF المدمج</button>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const fileList = document.getElementById('fileList');
  const downloadBtn = document.getElementById('downloadBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');

  let pdfFiles = [];

  uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  fileInput.addEventListener('change', (e) => { if(e.target.files.length) handleFiles(e.target.files); });

  function handleFiles(files) {
    const validFiles = Array.from(files).filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
    if(validFiles.length === 0) { alert('الرجاء اختيار ملفات PDF صالحة'); return; }
    
    validFiles.forEach(file => {
      if(file.size > 10 * 1024 * 1024) { alert(`الملف ${file.name} كبير جداً. الحد الأقصى 10 ميجابايت`); return; }
      pdfFiles.push(file);
    });
    
    renderFileList();
    if(pdfFiles.length > 0) downloadBtn.style.display = 'inline-block';
  }

  function renderFileList() {
    fileList.innerHTML = '';
    pdfFiles.forEach((file, idx) => {
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <span class="name"><i class="fas fa-file-pdf" style="color:#e74c3c; margin-left:8px;"></i>${file.name}</span>
        <span class="size">${(file.size / 1024).toFixed(1)} KB</span>
        <button class="remove" data-index="${idx}"><i class="fas fa-times"></i></button>
      `;
      fileList.appendChild(div);
    });
    
    document.querySelectorAll('.remove').forEach(btn => {
      btn.addEventListener('click', () => {
        pdfFiles.splice(parseInt(btn.dataset.index), 1);
        renderFileList();
        if(pdfFiles.length === 0) downloadBtn.style.display = 'none';
      });
    });
  }

  downloadBtn.addEventListener('click', async () => {
    if(pdfFiles.length === 0) return;
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';

    try {
      const { PDFDocument } = PDFLib;
      const mergedPdf = await PDFDocument.create();
      
      for(let i = 0; i < pdfFiles.length; i++) {
        const file = pdfFiles[i];
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await PDFDocument.load(arrayBuffer);
        const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
        pages.forEach(page => mergedPdf.addPage(page));
        progressFill.style.width = `${((i + 1) / pdfFiles.length) * 100}%`;
      }
      
      const pdfBytes = await mergedPdf.save();
      const blob = new Blob([pdfBytes], { type: 'application/pdf' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'fichier_merged.pdf';
      link.click();
      URL.revokeObjectURL(url);
      progressBar.style.display = 'none';
    } catch(err) {
      alert('حدث خطأ أثناء دمج الملفات. تأكد من أن الملفات صالحة.');
      console.error(err);
      progressBar.style.display = 'none';
    }
  });

  // Load PDF-lib
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js';
  document.head.appendChild(script);
</script>
</body>
</html>
