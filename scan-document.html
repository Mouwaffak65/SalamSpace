<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مسح مستند | salamm.online</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    body { background: #f4f8fe; min-height: 100vh; padding: 1rem; }
    .container { max-width: 1200px; margin: 0 auto; }
    .header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); padding: 0.6rem 1.8rem; border-radius: 60px; box-shadow: 0 10px 30px rgba(0,20,40,0.08); margin-bottom: 2rem; border: 1px solid rgba(255,255,255,0.7); }
    .logo h1 { font-size: 1.9rem; font-weight: 700; color: #0b2a3e; display: flex; align-items: center; gap: 6px; }
    .logo h1 i { color: #1f6390; }
    .main-nav { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem 1.2rem; }
    .main-nav a { color: #1a3b52; text-decoration: none; font-weight: 500; font-size: 0.95rem; padding: 0.4rem 0.2rem; border-bottom: 2px solid transparent; transition: 0.2s; display: flex; align-items: center; gap: 5px; }
    .main-nav a:hover { border-bottom-color: #1f6390; }
    .main-nav a i { color: #2a7faa; }
    .main-nav .nav-cta { background: #1a4b6d; color: white; padding: 0.4rem 1.4rem; border-radius: 40px; border-bottom: none; }
    .main-nav .nav-cta:hover { background: #0f3a57; border-bottom: none; }
    .menu-toggle { display: none; background: none; border: none; font-size: 1.8rem; color: #0b2a3e; cursor: pointer; }
    .tool-page { background: white; border-radius: 40px; padding: 2.5rem; box-shadow: 0 8px 30px rgba(0,20,30,0.06); }
    .tool-page h2 { font-size: 2rem; color: #0b2a3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 12px; }
    .tool-page h2 i { color: #1f6390; }
    .tool-page .desc { color: #2c5779; font-size: 1.1rem; margin-bottom: 2rem; border-right: 4px solid #1f6390; padding-right: 1rem; }
    .upload-area { border: 3px dashed #cbdae6; border-radius: 30px; padding: 2rem; text-align: center; background: #f8fbfe; transition: 0.3s; cursor: pointer; }
    .upload-area:hover { border-color: #1f6390; background: #f0f6fc; }
    .upload-area i { font-size: 4rem; color: #1f6390; margin-bottom: 1rem; }
    .upload-area p { color: #1a3b52; font-size: 1.1rem; }
    .upload-area .btn { display: inline-block; margin-top: 1.2rem; background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }
    .upload-area .btn:hover { background: #0f3a57; }
    .scan-preview { margin-top: 1.5rem; text-align: center; }
    .scan-preview img { max-width: 100%; max-height: 400px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
    .scan-controls { margin-top: 1.5rem; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .scan-controls .btn { background: #1a4b6d; color: white; padding: 0.8rem 2rem; border-radius: 40px; border: none; font-weight: 600; cursor: pointer; }
    .scan-controls .btn:hover { background: #0f3a57; }
    .scan-controls .btn-success { background: #27ae60; }
    .scan-controls .btn-success:hover { background: #219a52; }
    .video-container { position: relative; display: none; margin-top: 1.5rem; }
    .video-container video { width: 100%; max-width: 600px; border-radius: 16px; background: #000; }
    .video-container canvas { display: none; }
    .footer { margin-top: 2.5rem; text-align: center; color: #2c5779; border-top: 1px solid rgba(0,0,0,0.05); padding-top: 1.5rem; display: flex; flex-wrap: wrap; justify-content: center; gap: 0.8rem 1.8rem; }
    .footer a { color: #1f6390; text-decoration: none; }
    @media (max-width: 820px) { .menu-toggle { display: block; } .main-nav { display: none; flex-direction: column; width: 100%; background: white; padding: 1rem; border-radius: 32px; margin-top: 0.8rem; } .main-nav.open { display: flex; } .header { padding: 0.6rem 1rem; } .tool-page { padding: 1.5rem; } }
  </style>
</head>
<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
      <a href="arabic-test.html" class="nav-cta"><i class="fas fa-certificate"></i> اختبار اللغة</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-camera-retro"></i> مسح مستند</h2>
    <div class="desc">التقط صورة لمستندك باستخدام الكاميرا أو حمّل صورة لتحويلها إلى PDF.</div>
    
    <div class="upload-area" id="dropZone">
      <i class="fas fa-camera"></i>
      <p>التقط صورة أو اختر ملف صورة من جهازك</p>
      <input type="file" id="fileInput" accept="image/*" style="display:none;" />
      <button class="btn" id="uploadBtn"><i class="fas fa-upload"></i> تحميل صورة</button>
      <button class="btn" id="cameraBtn" style="background:#2a7faa; margin-right:10px;"><i class="fas fa-camera"></i> فتح الكاميرا</button>
    </div>

    <div class="video-container" id="videoContainer">
      <video id="video" autoplay playsinline></video>
      <div class="scan-controls">
        <button class="btn btn-success" id="captureBtn"><i class="fas fa-camera"></i> التقاط الصورة</button>
        <button class="btn" id="closeCameraBtn"><i class="fas fa-times"></i> إغلاق الكاميرا</button>
      </div>
    </div>

    <div class="scan-preview" id="previewContainer"></div>
    <div class="scan-controls" id="downloadControls" style="display:none;">
      <button class="btn btn-success" id="downloadPdfBtn"><i class="fas fa-file-pdf"></i> تحميل PDF</button>
      <button class="btn" id="resetBtn"><i class="fas fa-redo"></i> مسح</button>
    </div>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const cameraBtn = document.getElementById('cameraBtn');
  const videoContainer = document.getElementById('videoContainer');
  const video = document.getElementById('video');
  const captureBtn = document.getElementById('captureBtn');
  const closeCameraBtn = document.getElementById('closeCameraBtn');
  const previewContainer = document.getElementById('previewContainer');
  const downloadControls = document.getElementById('downloadControls');
  const downloadPdfBtn = document.getElementById('downloadPdfBtn');
  const resetBtn = document.getElementById('resetBtn');

  let capturedImage = null;
  let stream = null;

  uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  fileInput.addEventListener('change', (e) => { if(e.target.files[0]) processImageFile(e.target.files[0]); });

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = stream;
      videoContainer.style.display = 'block';
      dropZone.style.display = 'none';
    } catch(err) {
      alert('تعذر الوصول إلى الكاميرا. تأكد من منح الإذن.');
      console.error(err);
    }
  }

  cameraBtn.addEventListener('click', startCamera);

  closeCameraBtn.addEventListener('click', () => {
    if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    videoContainer.style.display = 'none';
    dropZone.style.display = 'block';
  });

  captureBtn.addEventListener('click', () => {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);
    const imageData = canvas.toDataURL('image/jpeg', 0.95);
    processImage(imageData);
    if(stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    videoContainer.style.display = 'none';
    dropZone.style.display = 'block';
  });

  function processImageFile(file) {
    if(!file.type.startsWith('image/')) { alert('الرجاء اختيار ملف صورة'); return; }
    const reader = new FileReader();
    reader.onload = (e) => processImage(e.target.result);
    reader.readAsDataURL(file);
  }

  function processImage(imageData) {
    capturedImage = imageData;
    previewContainer.innerHTML = `<img src="${imageData}" alt="المستند الممسوح" />`;
    downloadControls.style.display = 'flex';
    dropZone.style.display = 'none';
  }

  resetBtn.addEventListener('click', () => {
    capturedImage = null;
    previewContainer.innerHTML = '';
    downloadControls.style.display = 'none';
    dropZone.style.display = 'block';
  });

  downloadPdfBtn.addEventListener('click', () => {
    if(!capturedImage) return;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const img = new Image();
    img.src = capturedImage;
    const aspectRatio = img.width / img.height;
    let width = 190;
    let height = width / aspectRatio;
    if(height > 277) { height = 277; width = height * aspectRatio; }
    const x = (210 - width) / 2;
    const y = (297 - height) / 2;
    pdf.addImage(capturedImage, 'JPEG', x, y, width, height);
    pdf.save('document_scanne.pdf');
  });

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
  document.head.appendChild(script);
</script>
</body>
</html>
