    .upload-area .btn { display: inline-block; margin-top: 1.2rem; background: #1a4b6d; color: white; padding: 0.8rem 2.5rem; border-radius: 40px; text-decoration: none; font-weight: 600; border: none; cursor: pointer; }

    .extracted-text pre { white-space: pre-wrap; word-break: break-word; font-family: inherit; font-size: 0.95rem; line-height: 1.8; }
    .btn-success { background: #27ae60; }
    .btn-success:hover { background: #219a52; }
    .btn-secondary { background: #e8f0f7; color: #0b2a3e; }
    .btn-secondary:hover { background: #d5e2ed; }
    .actions { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }

    .progress-bar .fill { height: 100%; background: #1f6390; width: 0%; border-radius: 10px; transition: width 0.3s; }
    @media (max-width: 820px) { .menu-toggle { display: block; } .main-nav { display: none; flex-direction: column; width: 100%; background: white; padding: 1rem; border-radius: 32px; margin-top: 0.8rem; } .main-nav.open { display: flex; } .header { padding: 0.6rem 1rem; } .tool-page { padding: 1.5rem; } }

<body>
<div class="container">
  <header class="header">
    <div class="logo"><h1><i class="fas fa-graduation-cap"></i> salamm.online</h1></div>
    <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html"><i class="fas fa-home"></i> الرئيسية</a>
      <a href="index.html#tools"><i class="fas fa-tools"></i> الأدوات</a>
      <a href="index.html#conseils"><i class="fas fa-lightbulb"></i> نصائح</a>
      <a href="about.html"><i class="fas fa-info-circle"></i> عن الموقع</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> اتصل بنا</a>
      <a href="arabic-test.html" class="nav-cta"><i class="fas fa-certificate"></i> اختبار اللغة</a>
    </nav>
  </header>

  <section class="tool-page">
    <h2><i class="fas fa-file-pdf"></i> استخراج النص من PDF</h2>
    <div class="desc">استخرج النصوص من ملفات PDF بسهولة.</div>
    
    <div class="upload-area" id="dropZone">
      <i class="fas fa-cloud-upload-alt"></i>
      <p>اسحب ملف PDF هنا أو انقر لاختياره</p>
      <input type="file" id="fileInput" accept=".pdf" style="display:none;" />
      <button class="btn" id="uploadBtn"><i class="fas fa-upload"></i> اختيار ملف PDF</button>
    </div>

    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>

    <div class="extracted-text" id="resultContainer">
      <h4><i class="fas fa-file-alt"></i> النص المستخرج:</h4>
      <pre id="extractedContent"></pre>
      <div class="actions">
        <button class="btn btn-success" id="copyBtn"><i class="fas fa-copy"></i> نسخ النص</button>
        <button class="btn btn-secondary" id="clearBtn"><i class="fas fa-eraser"></i> مسح</button>
      </div>
    </div>
  </section>

  <footer class="footer">
    <span><i class="fas fa-graduation-cap"></i> salamm.online</span>
    <a href="about.html">عن الموقع</a>
    <a href="privacy.html">سياسة الخصوصية</a>
    <a href="terms.html">شروط الاستخدام</a>
  </footer>
</div>

<script>
  const toggle = document.getElementById('menuToggle');
  const nav = document.getElementById('mainNav');
  if(toggle && nav) { toggle.addEventListener('click', () => { nav.classList.toggle('open'); }); }

  const dropZone = document.getElementById('dropZone');
  const fileInput = document.getElementById('fileInput');
  const uploadBtn = document.getElementById('uploadBtn');
  const progressBar = document.getElementById('progressBar');
  const progressFill = document.getElementById('progressFill');
  const resultContainer = document.getElementById('resultContainer');
  const extractedContent = document.getElementById('extractedContent');
  const copyBtn = document.getElementById('copyBtn');
  const clearBtn = document.getElementById('clearBtn');

  uploadBtn.addEventListener('click', (e) => { e.stopPropagation(); fileInput.click(); });
  dropZone.addEventListener('click', () => fileInput.click());

  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });

  fileInput.addEventListener('change', (e) => { if(e.target.files[0]) handleFile(e.target.files[0]); });

  async function handleFile(file) {
    if(!file || file.type !== 'application/pdf') { alert('الرجاء اختيار ملف PDF صالح'); return; }

    resultContainer.style.display = 'none';
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';

    try {
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = '';
      const totalPages = pdf.numPages;

      for(let i = 1; i <= totalPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const pageText = textContent.items.map(item => item.str).join(' ');
        fullText += `\n--- الصفحة ${i} ---\n${pageText}\n`;
        progressFill.style.width = `${(i / totalPages) * 100}%`;
      }

      extractedContent.textContent = fullText.trim() || 'لم يتم العثور على نص في هذا الملف.';
      resultContainer.style.display = 'block';
      progressBar.style.display = 'none';
    } catch(err) {
      alert('حدث خطأ أثناء قراءة الملف. تأكد من أن الملف هو PDF صالح.');
      console.error(err);
      progressBar.style.display = 'none';
    }
  }

  copyBtn.addEventListener('click', () => {
    const text = extractedContent.textContent;
    if(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('تم نسخ النص إلى الحافظة!');
      }).catch(() => {
        // Fallback
        const range = document.createRange();
        range.selectNode(extractedContent);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
        document.execCommand('copy');
        alert('تم نسخ النص إلى الحافظة!');
      });
    }
  });

  clearBtn.addEventListener('click', () => {
    resultContainer.style.display = 'none';
    extractedContent.textContent = '';
    fileInput.value = '';
  });

  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
  document.head.appendChild(script);
  script.onload = () => { pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js'; };
</script>
</body>
</html>
